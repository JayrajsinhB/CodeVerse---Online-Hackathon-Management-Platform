{% extends 'base.html' %}
{% block content %}
<div class="row mt-5">
    <div class="col-md-8 offset-md-2">
        <div class="card shadow-sm border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2>Submit Project</h2>
                    <p class="text-muted">Team: <strong>{{ team.name }}</strong> | Hackathon: <strong>{{ hackathon.title }}</strong></p>
                </div>
                
                <form method="POST">
                    {% csrf_token %}
                    
                    {{ form.as_p }}
                    
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-success btn-lg">Save Submission</button>
                        <a href="{% url 'dashboard' %}" class="btn btn-outline-dark">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
