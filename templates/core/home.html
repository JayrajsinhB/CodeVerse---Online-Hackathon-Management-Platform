{% extends 'base.html' %}

{% block content %}

<style>

.hero{
height:75vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero-title{
font-size:3rem;
font-weight:700;
color:#0d6efd;
}

.hero-sub{
font-size:1.2rem;
color:#6c757d;
margin-top:10px;
}

.hero-btns{
margin-top:30px;
}

</style>


<div class="hero">

<div>

<h1 class="hero-title">Welcome to CodeVerse</h1>

<p class="hero-sub">
The platform where developers collaborate, build and compete in hackathons.
</p>

<div class="hero-btns">

{% if not request.user.is_authenticated %}

<a href="{% url 'login' %}" class="btn btn-primary btn-lg me-3">
Login
</a>

<a href="{% url 'signup' %}" class="btn btn-outline-primary btn-lg">
Sign Up
</a>

{% else %}

<a href="{% url 'dashboard' %}" class="btn btn-success btn-lg">
Go to Dashboard
</a>

{% endif %}

</div>

</div>

</div>

{% endblock %}
